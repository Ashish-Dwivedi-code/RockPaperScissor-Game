<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock paper scissor game </title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <div id ="head" class="heading"> 
              <h1>Rock Paper Scissors Game</h1>
        </div>
        
        <div class="choices">
            <div id ="Rock" class="choice">
               <img src="https://thf.bing.com/th/id/OIP.NMhMlw1aue9vzUepxWeCpAHaEK?w=308&h=180&c=7&r=0&o=7&cb=thfc1falcon2&dpr=1.3&pid=1.7&rm=3" alt="Rock">
            </div>
            <div id="paper" class="choice">
                 <img src="https://thf.bing.com/th/id/OIP.hZ19DgfkM-W7JY_9A1YFugHaEK?w=256&h=180&c=7&r=0&o=7&cb=thfc1falcon2&dpr=1.3&pid=1.7&rm=3" alt="Paper">
            </div>
            <div id="scissor" class="choice">
                 <img src="https://029-chirag.github.io/SPS/scissors.png" alt="Scissors">
            </div>
        </div>

        <div class="score-board">
           <div class="score">
            <p id="computer-score">0</p>
            <p>You</p>
           </div>

            <div class="score">
            <p id="user-score">0</p>
            <p>Computer</p>
           </div>
        </div>
        <div class="msg-container">
            <p id="msg">Play your move</p>
        </div>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
